<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE SYSTEM | Portafolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&family=Space+Grotesk:wght@700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            background-image: radial-gradient(circle at 50% -20%, #1e293b, transparent);
        }

        .cyber-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cyber-card:hover {
            border-color: #22d3ee;
            background: rgba(15, 23, 42, 0.8);
            transform: translateY(-10px);
            box-shadow: 0 20px 40px -15px rgba(34, 211, 238, 0.2);
        }

        .project-title {
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: -0.02em;
        }
    </style>
</head>
<body class="text-slate-300 min-h-screen flex flex-col items-center p-8 md:p-20">

    <div class="max-w-6xl w-full">
        <header class="text-center mb-24">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-cyan-500/10 border border-cyan-500/20 text-cyan-400 text-[10px] font-bold uppercase tracking-widest mb-6">
                <span class="w-2 h-2 bg-cyan-500 rounded-full animate-ping"></span>
                System Live
            </div>
            <h1 class="text-6xl md:text-8xl font-black text-white tracking-tighter mb-4">
                CORE<span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">_LABS</span>
            </h1>
            <p class="text-slate-500 max-w-md mx-auto text-sm">Explora los módulos activos de gastronomía y servicios.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            {% for p in proyectos %}
            <a href="{{ url_for(p.endpoint) }}" class="cyber-card group p-10 rounded-[2.5rem] relative">
                <div class="flex flex-col h-full">
                    
                    <div class="flex justify-between items-center mb-16">
                        <div class="w-12 h-12 bg-slate-800 rounded-2xl flex items-center justify-center border border-slate-700 group-hover:border-cyan-500 transition-colors">
                            <i class="fas fa-layer-group text-cyan-500"></i>
                        </div>
                        <span class="text-[10px] font-mono text-slate-600 bg-black/40 px-3 py-1 rounded-lg">ID: {{ p.id }}</span>
                    </div>

                    <h2 class="project-title text-4xl font-bold text-white leading-none mb-3 group-hover:text-cyan-400 transition-colors">
                        {{ p.titulo }}
                    </h2>
                    
                    <p class="text-[10px] uppercase tracking-[0.3em] font-bold text-slate-500 group-hover:text-cyan-600 transition-colors">
                        Módulo de Servicio
                    </p>

                    <div class="mt-14 pt-6 border-t border-slate-800/50 flex justify-between items-center">
                        <span class="text-[11px] font-black uppercase text-slate-400 group-hover:text-white transition-colors">Abrir Aplicación</span>
                        <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center group-hover:bg-cyan-500 group-hover:text-black transition-all">
                            <i class="fas fa-arrow-right text-xs"></i>
                        </div>
                    </div>
                </div>
            </a>
            {% endfor %}
        </div>

        <footer class="mt-32 pt-10 border-t border-slate-900 flex justify-between items-center text-[10px] font-bold uppercase tracking-widest text-slate-600">
            <div>Nodes Found: {{ proyectos|length }}</div>
            <div class="hidden md:block">Santiago Metropolitan Region // 2026</div>
        </footer>
    </div>

</body>
</html>
